<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ config.app.title }}</title>
  <link rel="icon" type="image/png" href="{{ request.url_for('static', path='birdy.png') }}">
  <link rel="stylesheet" href="{{ request.url_for('static', path='style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img class="brand-logo" src="{{ request.url_for('static', path='birdy.svg') }}" alt="Virtitta logo">
      <div class="titleblock">
        <h1>{{ config.app.title }}</h1>
        <div class="subtitle">VirPipa run review</div>
      </div>
    </div>
    <nav class="topnav">
      <a href="{{ request.url_for('index') }}">Samples</a>
    </nav>
  </header>
  <main class="layout">
    {% if warning_message %}
    <section class="panel warning-banner">{{ warning_message }}</section>
    {% endif %}
    {% if notice_message %}
    <section class="panel notice-banner">{{ notice_message }}</section>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
