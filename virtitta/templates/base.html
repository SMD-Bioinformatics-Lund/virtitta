<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ config.app.title }}</title>
  <link rel="icon" type="image/png" href="{{ request.url_for('static', path='birdy.png') }}">
  <link rel="stylesheet" href="{{ request.url_for('static', path='style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <a href="{{ request.url_for('index') }}" aria-label="Go to sample table">
        <img class="brand-logo" src="{{ request.url_for('static', path='birdy.svg') }}" alt="Virtitta logo">
      </a>
      <div class="titleblock">
        <h1>{{ config.app.title }}</h1>
        <div class="subtitle">VirPipa run review</div>
      </div>
    </div>
    {% set initial_toast_message = warning_message or notice_message %}
    {% set initial_toast_is_error = warning_message %}
    <div class="toast-region" aria-live="polite" aria-atomic="true">
      <section id="app-toast" class="app-toast {% if initial_toast_is_error %}warning-banner{% else %}notice-banner{% endif %}" role="{% if initial_toast_is_error %}alert{% else %}status{% endif %}" {% if not initial_toast_message %}hidden{% endif %}>
        <span id="app-toast-message">{{ initial_toast_message }}</span>
        <button type="button" id="app-toast-close" class="toast-close" aria-label="Dismiss notification">&times;</button>
      </section>
    </div>
    <nav class="topnav">
      <a href="{{ request.url_for('index') }}">Samples</a>
    </nav>
  </header>
  <main class="layout">
    {% block content %}{% endblock %}
  </main>
  <script>
  const appToast = document.getElementById('app-toast');
  const appToastMessage = document.getElementById('app-toast-message');
  const appToastClose = document.getElementById('app-toast-close');
  let appToastTimer = null;

  function hideAppToast() {
    window.clearTimeout(appToastTimer);
    appToastTimer = null;
    appToast.hidden = true;
  }

  window.showAppToast = function(message, isError = false) {
    window.clearTimeout(appToastTimer);
    appToastMessage.textContent = message;
    appToast.hidden = false;
    appToast.classList.toggle('warning-banner', isError);
    appToast.classList.toggle('notice-banner', !isError);
    appToast.setAttribute('role', isError ? 'alert' : 'status');
    appToastTimer = window.setTimeout(hideAppToast, isError ? 8000 : 4500);
  };

  appToastClose.addEventListener('click', hideAppToast);

  const initialToasts = [
    {% if notice_message %}{ message: {{ notice_message|tojson }}, isError: false },{% endif %}
    {% if warning_message %}{ message: {{ warning_message|tojson }}, isError: true },{% endif %}
  ];

  if (initialToasts.length) {
    const url = new URL(window.location.href);
    let changed = false;

    for (const param of ['warning', 'notice']) {
      if (url.searchParams.has(param)) {
        url.searchParams.delete(param);
        changed = true;
      }
    }

    if (changed) {
      window.history.replaceState({}, '', url.toString());
    }

    for (const item of initialToasts) {
      window.showAppToast(item.message, item.isError);
    }
  }
  </script>
</body>
</html>
